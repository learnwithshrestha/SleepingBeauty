<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Sky Follow Request</title>

<style>

/* RESET */
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Segoe UI",Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

/* NIGHT SKY BACKGROUND */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:
radial-gradient(circle at 20% 30%, #1b2735, transparent 40%),
radial-gradient(circle at 80% 70%, #090a0f, transparent 50%),
linear-gradient(to top,#020111 0%,#191621 50%,#223366 100%);
}

/* CARD */
.card{
position:relative;
z-index:10;
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
text-align:center;
color:white;
box-shadow:0 0 40px rgba(0,0,0,0.6);
width:90%;
max-width:400px;
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

/* TITLE */
h2{
margin-bottom:20px;
text-shadow:0 0 10px rgba(255,255,255,0.5);
}

/* BUTTONS */
.buttons{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:15px;
}

button{
font-size:18px;
padding:12px 25px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

#yesBtn{
background:linear-gradient(45deg,#00c853,#69f0ae);
color:rgb(14, 2, 2);
box-shadow:0 0 15px #00c853;
}

#yesBtn:hover{
transform:scale(1.1);
}

#noBtn{
background:linear-gradient(45deg,#d50000,#ff5252);
color:rgb(0, 0, 0);
box-shadow:0 0 15px #ff1744;
}

/* MESSAGE */
#message{
margin-top:10px;
font-size:18px;
color:#ffd166;
min-height:25px;
}

/* LYRICS */
#lyrics{
margin-top:15px;
font-size:16px;
color:#00e5ff;
min-height:25px;
text-shadow:0 0 10px #00e5ff;
}

/* CANVAS */
canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

/* AUDIO */
audio{
width:100%;
margin-top:15px;
filter:brightness(1.2);
}

</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="fireworks"></canvas>

<div class="card">

<h2>Can you follow me back? 🌙</h2>

<div class="buttons">
<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>
</div>

<div id="message"></div>

<audio id="audio" controls>
<source src="song.mp3" type="audio/mp3">
</audio>

<div id="lyrics"></div>

</div>

<script>

/* ELEMENTS */
const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const audio=document.getElementById("audio");


/* NO BUTTON ESCAPE — INSTANT MOBILE RESPONSE */

function moveNoButton(){

noBtn.style.position = "fixed";

const rect = noBtn.getBoundingClientRect();

const maxX = window.innerWidth - rect.width;
const maxY = window.innerHeight - rect.height;

const x = Math.random() * maxX;
const y = Math.random() * maxY;

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}


/* FASTEST MOBILE EVENT */
noBtn.addEventListener("pointerdown", function(e){
e.preventDefault();
moveNoButton();
});


/* EXTRA FAST BACKUP */
noBtn.addEventListener("pointermove", function(e){
moveNoButton();
});

/* YES BUTTON */
yesBtn.onclick=()=>{

document.getElementById("message").innerHTML=
"✔ Friend request accepted 🎉";

audio.play();
startFireworks();

};


/* LYRICS */
const lyrics=[
{time:0,text:"Hello, thanks for following"},
{time:3,text:"Welcome to the night sky"},
{time:6,text:"Stars are shining for you"},
{time:9,text:"Enjoy the beautiful night"},
{time:15,text:"Every breath you take"},
{time:19,text:"Every move you make"},
{time:23,text:"Every bond you break"},
{time:25,text:"every step you take I'll be watching you"},
  {time:31,text:"Every single day"},
  {time:36,text:"and every word you say"},
   {time:40,text:"Every game you play"},
  {time:41,text:"every night you stay I'll be watching you"},
  {time:42,text:"I'll be watching you"}
  
];

audio.ontimeupdate=()=>{

let current=Math.floor(audio.currentTime);

lyrics.forEach(line=>{
if(current===line.time){
lyricsDiv.innerHTML=line.text;
}
});

};

const lyricsDiv=document.getElementById("lyrics");


/* STARS SYSTEM */
const starCanvas=document.getElementById("stars");
const starCtx=starCanvas.getContext("2d");

starCanvas.width=window.innerWidth;
starCanvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){

stars.push({

x:Math.random()*starCanvas.width,
y:Math.random()*starCanvas.height,
size:Math.random()*2,
alpha:Math.random()

});

}

function drawStars(){

starCtx.clearRect(0,0,starCanvas.width,starCanvas.height);

stars.forEach(star=>{

star.alpha+=Math.random()*0.02-0.01;

if(star.alpha<0)star.alpha=0;
if(star.alpha>1)star.alpha=1;

starCtx.globalAlpha=star.alpha;
starCtx.fillStyle="white";
starCtx.fillRect(star.x,star.y,star.size,star.size);

});

requestAnimationFrame(drawStars);

}

drawStars();


/* FIREWORK SYSTEM */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let rockets=[];
let particles=[];
let fireworkInterval;


function launchFirework(){

rockets.push({

x:Math.random()*canvas.width,
y:canvas.height,
vy:-(Math.random()*5+7),
color:`hsl(${Math.random()*360},100%,60%)`,
target:Math.random()*canvas.height*0.5

});

}


function explode(x,y){

for(let i=0;i<200;i++){

const angle=Math.random()*Math.PI*2;
const speed=Math.random()*6;

particles.push({

x:x,
y:y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed,
life:120,
color:`hsl(${Math.random()*360},100%,60%)`

});

}

}


function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

rockets.forEach((r,i)=>{

r.y+=r.vy;

ctx.fillStyle=r.color;
ctx.fillRect(r.x,r.y,3,10);

if(r.y<=r.target){

explode(r.x,r.y);
rockets.splice(i,1);

}

});


particles.forEach((p,i)=>{

p.x+=p.vx;
p.y+=p.vy;
p.vy+=0.05;
p.life--;

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,2,2);

if(p.life<=0)particles.splice(i,1);

});

requestAnimationFrame(animate);

}

animate();


function startFireworks(){

if(fireworkInterval)return;

fireworkInterval=setInterval(launchFirework,500);

}


/* RESIZE */
window.onresize=()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

starCanvas.width=window.innerWidth;
starCanvas.height=window.innerHeight;

};

</script>

</body>

</html>
